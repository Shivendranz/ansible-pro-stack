---
# 1. Directory setup
- name: Create project directory
  file:
    path: "/home/ubuntu/pro-stack"
    state: directory
    mode: '0755'

# 2. Docker Compose file deploy
- name: Deploy Docker Compose Template
  template:
    src: docker-compose.yml.j2
    dest: "/home/ubuntu/pro-stack/docker-compose.yml"

# 3. Nginx Config deploy
- name: Deploy Nginx Configuration
  template:
    src: nginx.conf.j2
    dest: "/home/ubuntu/pro-stack/nginx.conf"

# 4. Stop old containers (Optional but safe)
- name: Clean old stack
  community.docker.docker_compose_v2:
    project_src: "/home/ubuntu/pro-stack"
    state: absent

# 5. Start the New Pro Stack
- name: Start the Pro Stack
  community.docker.docker_compose_v2:
    project_src: "/home/ubuntu/pro-stack"
    state: present
    pull: always
