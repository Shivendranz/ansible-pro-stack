name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # Yahan 'secrets.' lagana zaruri hai
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/micro-web-optimized:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/micro-web-optimized:latest

      - name: Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Write SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > id_rsa
          chmod 600 id_rsa

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini full-cycle.yml \
          --private-key id_rsa \
          --vault-password-file .vault_pass \
          -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
          -e "docker_image=${{ secrets.DOCKERHUB_USERNAME }}/micro-web-optimized:latest"
